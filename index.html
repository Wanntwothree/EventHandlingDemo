<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Form Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <form id="myForm">
      <input type="text" id="userInput" placeholder="Enter text" />
      <button type="submit">Submit</button>
    </form>
    <div id="output"></div>
    <button id="clearBtn">Clear</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
